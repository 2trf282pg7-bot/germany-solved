name: Generate Articles

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday    09:00 UTC
    - cron: '0 9 * * 3'   # Wednesday 09:00 UTC
    - cron: '0 9 * * 5'   # Friday    09:00 UTC
  workflow_dispatch:
    inputs:
      topic:
        description: 'Article topic (leave blank for random)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article
        run: node scripts/generate-article.js "${{ github.event.inputs.topic }}"

      - name: Update waiting times
        run: node scripts/update-waiting-times.js

      - name: Commit generated content
        run: |
          git config --global user.name  'germany-solved-bot'
          git config --global user.email 'bot@germanysolved.com'
          git add content/articles/ data/waiting-times.json
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: auto-generate article [skip ci]"
            git push
          fi
